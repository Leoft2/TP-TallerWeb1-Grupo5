<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Resultado del Examen</title>

    <style>

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        .resultado {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #333;
            margin: 0;
        }

        .puntaje {
            color: #4CAF50;
            font-size: 40px;
            font-weight: bold;
            margin-top: 15px;
        }

    </style>

</head>

<body>
   <div class="resultado">
       <h1>Resultado del Examen</h1>
       <div class="puntaje" th:text="${puntaje}"></div>
   </div>
</body>

</html>
